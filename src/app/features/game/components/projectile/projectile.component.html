<div class="game-container">

  <!-- HUD -->
  <div class="hud d-flex justify-content-between">
    <div>🔥 Score: {{ game.score }}</div>
    <div>⏱️ {{ game.timeLeft }}s</div>
    <div>❤️ {{ game.lives }}</div>
  </div>

  <!-- GAME AREA -->
  <div class="field">

    <!-- MISSILES -->
    <div *ngFor="let m of game.missiles"
         class="missile"
         [style.top.%]="m.y"
         [style.left.%]="m.x">
      {{ m.word }}
    </div>

    <!-- BULLETS -->
    <div *ngFor="let b of game.bullets"
         class="bullet"
         [style.top.%]="b.y"
         [style.left.%]="b.x">
    </div>

    <!-- ARTILLERY -->
    <div class="artillery">🛡️</div>

  </div>

  <!-- INPUT -->
  <div class="input text-center">
    {{ game.input }}
  </div>

  <!-- GAME OVER -->
  <div *ngIf="game.isGameOver" class="game-over text-center">
    <h2>Game Over</h2>
    <p>Score: {{ game.score }}</p>
    <p>WPM: {{ game.calculateWPM() }}</p>
    <p>Accuracy: {{ game.accuracy() }}%</p>

    <button class="btn btn-primary" (click)="startGame()">Play Again</button>
  </div>

</div>
